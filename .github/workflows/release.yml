name: Release

# Triggered by pushing a tag like `v0.1.0`. Creates a GitHub Release with:
#   - The CLI distribution (tar + zip) as release assets
#   - The VS Code extension .vsix as a release asset
#   - The Gradle plugin published to GitHub Packages
#
# Future: adding Plugin Portal / VS Code Marketplace / Open VSX is additive —
# just add new jobs here. Nothing below would need to change.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write     # create releases, upload assets
  packages: write     # push to GitHub Packages

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - id: extract
        # Strip leading `v` from tag, e.g. v0.1.0 → 0.1.0
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # Run gradle publish AFTER the other builds succeed so we don't orphan a
  # published Maven artifact if the VSIX or CLI build fails (GitHub Packages
  # refuses to overwrite an already-published release version — see #409).
  # `renderer-android` is published alongside the plugin so external consumers
  # that apply the plugin via GitHub Packages also get the Robolectric-based
  # Android renderer AAR — the plugin resolves it via matching version.
  publish-gradle-plugin:
    needs: [version, build-cli, build-vscode-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
      - name: Publish plugin and renderer-android to GitHub Packages
        env:
          PLUGIN_VERSION: ${{ needs.version.outputs.version }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ./gradlew \
            :gradle-plugin:publishAllPublicationsToGitHubPackagesRepository \
            :renderer-android:publishAllPublicationsToGitHubPackagesRepository \
            --no-daemon
      - name: Publish plugin and renderer-android to Maven Central
        env:
          PLUGIN_VERSION: ${{ needs.version.outputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew \
            :gradle-plugin:publishAndReleaseToMavenCentral \
            :renderer-android:publishAndReleaseToMavenCentral \
            --no-daemon --no-configuration-cache

  build-cli:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
      - name: Build CLI distribution
        env:
          PLUGIN_VERSION: ${{ needs.version.outputs.version }}
        run: ./gradlew :cli:distZip :cli:distTar --no-daemon
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-dist
          path: |
            cli/build/distributions/compose-preview-*.zip
            cli/build/distributions/compose-preview-*.tar.gz
          retention-days: 1

  build-vscode-extension:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci
      - name: Set version
        working-directory: vscode-extension
        run: npm version --no-git-tag-version --allow-same-version ${{ needs.version.outputs.version }}
      - name: Build VSIX
        working-directory: vscode-extension
        run: npm run package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vscode-extension
          path: vscode-extension/*.vsix
          retention-days: 1

  release:
    needs: [version, publish-gradle-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "compose-ai-tools ${{ needs.version.outputs.version }}" \
            --generate-notes \
            artifacts/*.zip \
            artifacts/*.tar.gz \
            artifacts/*.vsix
