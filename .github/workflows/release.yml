name: Release

# Builds and publishes the CLI, VS Code extension, and Gradle plugin +
# renderer-android for a given tag. Uploads the CLI/VSIX assets onto the
# GitHub Release (creating it if it doesn't exist yet).
#
# Entry points:
#   - workflow_call: called from release-please.yml after release-please
#     merges the release PR and creates the tag + Release. Primary path.
#   - workflow_dispatch: re-run the release build for an existing tag (e.g.
#     after a transient publish failure).
#   - push: tags (v*): escape hatch for manually-pushed tags.
#
# All three paths resolve to `TAG_NAME`, so downstream jobs don't care which
# fired. See docs/RELEASING.md.
on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v0.3.5).'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)release, e.g. v0.3.5. Must already exist.'
        required: true
        type: string
  push:
    tags:
      - 'v*'

# Workflow-level default is read-only. Each job widens only what it needs:
# - publish-gradle-plugin: packages: write (for GH Packages)
# - release: contents: write (creates/updates the GitHub Release, uploads assets)
permissions:
  contents: read

# Both tag-push and workflow_call/dispatch for the same tag serialize through
# the same concurrency group, so a re-run can't race a fresh release.
concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

# Every job consumes TAG_NAME (never GITHUB_REF_NAME) so the steps work the
# same whether triggered by tag push or by workflow_call/dispatch. Templated
# once here; scripts read it via `$TAG_NAME` from the env, which keeps tag
# content out of shell arg positions.
env:
  TAG_NAME: ${{ inputs.tag || github.ref_name }}

jobs:
  # Run gradle publish AFTER the other builds succeed so we don't orphan a
  # published Maven artifact if the VSIX or CLI build fails (GitHub Packages
  # refuses to overwrite an already-published release version — see #409).
  # `renderer-android` is published alongside the plugin so external consumers
  # that apply the plugin via GitHub Packages also get the Robolectric-based
  # Android renderer AAR — the plugin resolves it via matching version.
  # `preview-annotations` ships the `@ScrollingPreview` marker that Compose
  # apps add to their compileOnly classpath, so it must publish in lockstep.
  publish-gradle-plugin:
    needs: [build-cli, build-vscode-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GitHub Packages
    env:
      # Signing creds are shared by both publish steps. vanniktech's
      # `signAllPublications()` wires the `sign*` tasks as dependencies of
      # every publish task — including the GH Packages publication — so
      # "no configured signatory" errors out either publish without them.
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false
      - name: Derive plugin version from tag
        # Strip leading `v` from TAG_NAME, e.g. v0.1.0 → 0.1.0. $PLUGIN_VERSION
        # is inherited by every subsequent step in this job.
        run: echo "PLUGIN_VERSION=${TAG_NAME#v}" >> "$GITHUB_ENV"
      - uses: ./.github/actions/setup
        with:
          cache-read-only: 'true'
      - name: Publish plugin, renderer-android and preview-annotations to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ./gradlew \
            :gradle-plugin:publishAllPublicationsToGitHubPackagesRepository \
            :renderer-android:publishAllPublicationsToGitHubPackagesRepository \
            :preview-annotations:publishAllPublicationsToGitHubPackagesRepository
      - name: Publish plugin, renderer-android and preview-annotations to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          ./gradlew \
            :gradle-plugin:publishAndReleaseToMavenCentral \
            :renderer-android:publishAndReleaseToMavenCentral \
            :preview-annotations:publishAndReleaseToMavenCentral

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false
      - name: Derive plugin version from tag
        run: echo "PLUGIN_VERSION=${TAG_NAME#v}" >> "$GITHUB_ENV"
      - uses: ./.github/actions/setup
        with:
          cache-read-only: 'true'
      - name: Build CLI distribution
        run: ./gradlew :cli:distZip :cli:distTar
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-dist
          path: |
            cli/build/distributions/compose-preview-*.zip
            cli/build/distributions/compose-preview-*.tar.gz
          retention-days: 1

  build-vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false
      # Do not cache `npm` here: release builds produce artifacts that get
      # published, and a poisoned cache from an unrelated branch/run could
      # influence the installed dependency tree (zizmor: cache-poisoning).
      # `npm ci` on a clean runner is fast enough for a once-per-release job.
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci
      - name: Set version
        working-directory: vscode-extension
        # Read tag from $TAG_NAME (from env, not templated into the script) so
        # the tag name — attacker-influenceable through git or the dispatch
        # input — can't inject arguments into `npm version`.
        run: npm version --no-git-tag-version --allow-same-version "${TAG_NAME#v}"
      - name: Build VSIX
        working-directory: vscode-extension
        run: npm run package
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-extension
          path: vscode-extension/*.vsix
          retention-days: 1

  # Publish the prebuilt VSIX to both marketplaces. Runs alongside the
  # `release` job (not gating it) so a marketplace outage can't block the
  # `.vsix` landing on the GitHub Release. On workflow_dispatch re-runs for
  # an existing tag, "version already published" is treated as success so
  # reruns are idempotent. Secrets (VSCE_PAT, OVSX_PAT) are scoped per-step.
  publish-vscode-extension:
    needs: build-vscode-extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vscode-extension
          path: dist
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
      - name: Publish to VS Code Marketplace
        env:
          # vsce reads VSCE_PAT from env — keeps the token out of argv/logs.
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -o pipefail
          vsix=$(ls dist/*.vsix)
          echo "Publishing $vsix to VS Code Marketplace"
          if ! output=$(npx --yes @vscode/vsce@^3 publish --packagePath "$vsix" 2>&1); then
            printf '%s\n' "$output"
            if printf '%s' "$output" | grep -qiE "already.*published|already exists"; then
              echo "Version already on VS Code Marketplace — treating as success."
              exit 0
            fi
            exit 1
          fi
          printf '%s\n' "$output"
      - name: Publish to Open VSX
        # Run even if the Marketplace step failed — the two registries are
        # independent, so a PAT/outage on one shouldn't block the other.
        if: ${{ !cancelled() }}
        env:
          # ovsx reads OVSX_PAT from env.
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -o pipefail
          vsix=$(ls dist/*.vsix)
          echo "Publishing $vsix to Open VSX"
          if ! output=$(npx --yes ovsx@^0.10 publish "$vsix" 2>&1); then
            printf '%s\n' "$output"
            if printf '%s' "$output" | grep -qiE "already.*published|already exists"; then
              echo "Version already on Open VSX — treating as success."
              exit 0
            fi
            exit 1
          fi
          printf '%s\n' "$output"

  release:
    needs: publish-gradle-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write   # update the release, upload assets
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Upload or create GitHub Release
        # $TAG_NAME is read from env (not templated into the script), so the
        # tag name — attacker-influenceable through git or the dispatch input
        # — can't break out of the quotation and inject extra args.
        #
        # Idempotent: release-please has usually already created the Release
        # (with the CHANGELOG entry as the body) by the time this runs, so we
        # just upload assets onto it. Falls back to creating the Release for
        # tag-push / workflow_dispatch paths where it may not exist yet.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME exists — uploading assets."
            gh release upload "$TAG_NAME" \
              --clobber \
              artifacts/*.zip \
              artifacts/*.tar.gz \
              artifacts/*.vsix
          else
            echo "Release $TAG_NAME does not exist — creating."
            gh release create "$TAG_NAME" \
              --title "compose-ai-tools ${TAG_NAME#v}" \
              --generate-notes \
              artifacts/*.zip \
              artifacts/*.tar.gz \
              artifacts/*.vsix
          fi
