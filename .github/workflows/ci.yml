name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level default: minimum viable scope. Individual jobs can widen if
# they need it (none here do — all jobs are read-only builds + artifact upload,
# which only needs `contents: read`).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-tests:
    name: Plugin Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run unit tests
        run: ./gradlew :gradle-plugin:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-results
          path: gradle-plugin/build/reports/tests/

  functional-tests:
    name: Plugin Functional Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run functional tests
        run: ./gradlew :gradle-plugin:functionalTest
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: functional-test-results
          path: gradle-plugin/build/reports/tests/

  build-samples:
    name: Build Samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build CMP sample and discover previews
        run: ./gradlew :sample-cmp:discoverPreviews
      - name: Build Android sample and discover previews
        run: ./gradlew :sample-android:discoverPreviews
      # Full render for the screenshot-test sample — the interesting behaviour
      # isn't discovery (which `:sample-android` also exercises) but rendering
      # class-member @Previews co-applied with `com.android.compose.screenshot`.
      # Regressions in `PreviewRenderStrategy.resolveReceiver` or in the
      # screenshotTest classpath wiring surface only at render time, so
      # `discoverPreviews` alone would pass even when broken.
      - name: Render Android screenshot-test sample previews
        run: ./gradlew :sample-android-screenshot-test:renderAllPreviews
      # sample-wear's pixel-scan tests (`LongScrollPreviewPixelTest`) gate
      # the stitched Wear long-preview output against known flake
      # signatures — ghost peek-pill rows, scaled-card seam ghosts,
      # incomplete EdgeButton reveal. The test task `dependsOn
      # renderAllPreviews` in sample-wear/build.gradle.kts, so this single
      # invocation both renders and asserts.
      - name: Render + pixel-test Wear sample previews
        run: ./gradlew :sample-wear:testDebugUnitTest
      - name: Upload preview manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-manifests
          path: |
            sample-android/build/compose-previews/previews.json
            sample-android-screenshot-test/build/compose-previews/previews.json
            sample-cmp/build/compose-previews/previews.json
      - name: Upload screenshot-test renders
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sample-android-screenshot-test-renders
          path: sample-android-screenshot-test/build/compose-previews/renders/
      - name: Upload sample-wear renders
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sample-wear-renders
          path: sample-wear/build/compose-previews/renders/
      - name: Upload sample-wear test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sample-wear-test-results
          path: sample-wear/build/reports/tests/

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build CLI
        run: ./gradlew :cli:build

  # Pure-stdlib unittest for the script that drives `preview-baselines` and
  # `preview-comment` actions. Lives here because the script is JSON-shape-
  # coupled to the CLI — running it on every PR catches contract breaks
  # (e.g. PR #76 bare-list → envelope) before they hit a real PR.
  actions-tests:
    name: Actions Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run compare-previews tests
        run: python3 .github/actions/lib/test_compare_previews.py -v
