name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level default: minimum viable scope. Individual jobs can widen if
# they need it (none here do — all jobs are read-only builds + artifact upload,
# which only needs `contents: read`).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-tests:
    name: Plugin Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run unit tests
        run: ./gradlew :gradle-plugin:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-results
          path: gradle-plugin/build/reports/tests/

  functional-tests:
    name: Plugin Functional Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run functional tests
        run: ./gradlew :gradle-plugin:functionalTest
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: functional-test-results
          path: gradle-plugin/build/reports/tests/

  build-samples:
    name: Build Samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build CMP sample and discover previews
        run: ./gradlew :sample-cmp:discoverPreviews
      - name: Build Android sample and discover previews
        run: ./gradlew :sample-android:discoverPreviews
      - name: Upload preview manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-manifests
          path: |
            sample-android/build/compose-previews/previews.json
            sample-cmp/build/compose-previews/previews.json

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build CLI
        run: ./gradlew :cli:build
