name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level default: minimum viable scope. Individual jobs can widen if
# they need it (none here do — all jobs are read-only builds + artifact upload,
# which only needs `contents: read`).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-tests:
    name: Plugin Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run unit tests
        run: ./gradlew :gradle-plugin:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-results
          path: gradle-plugin/build/reports/tests/

  functional-tests:
    name: Plugin Functional Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run functional tests
        run: ./gradlew :gradle-plugin:functionalTest
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: functional-test-results
          path: gradle-plugin/build/reports/tests/

  build-samples:
    name: Build Samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build CMP sample and discover previews
        run: ./gradlew :samples:cmp:discoverPreviews
      - name: Build Android sample and discover previews
        run: ./gradlew :samples:android:discoverPreviews
      # Full render for the screenshot-test sample — the interesting behaviour
      # isn't discovery (which `:samples:android` also exercises) but rendering
      # class-member @Previews co-applied with `com.android.compose.screenshot`.
      # Regressions in `PreviewRenderStrategy.resolveReceiver` or in the
      # screenshotTest classpath wiring surface only at render time, so
      # `discoverPreviews` alone would pass even when broken.
      - name: Render Android screenshot-test sample previews
        run: ./gradlew :samples:android-screenshot-test:renderAllPreviews
      # samples/wear's pixel-scan tests (`LongScrollPreviewPixelTest`) gate
      # the stitched Wear long-preview output against known flake
      # signatures — ghost peek-pill rows, scaled-card seam ghosts,
      # incomplete EdgeButton reveal. The test task `dependsOn
      # renderAllPreviews` in samples/wear/build.gradle.kts, so this single
      # invocation both renders and asserts.
      - name: Render + pixel-test Wear sample previews
        run: ./gradlew :samples:wear:testDebugUnitTest
      # Exercise the Android XML resource preview pipeline against
      # samples/android. Discovery + renderer together; the rendered set
      # (6 vector PNGs + 8 adaptive-icon PNGs + 1 AVD GIF, see
      # docs/ANDROID_RESOURCE_PREVIEWS.md) and the AndroidManifest
      # icon-reference index land under
      # `build/compose-previews/{resources.json,renders/resources/}`.
      - name: Render Android resource previews
        run: ./gradlew :samples:android:renderAndroidResources
      - name: Upload preview manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-manifests
          path: |
            samples/android/build/compose-previews/previews.json
            samples/android/build/compose-previews/resources.json
            samples/android-screenshot-test/build/compose-previews/previews.json
            samples/cmp/build/compose-previews/previews.json
      - name: Upload Android resource renders
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: samples-android-resource-renders
          path: samples/android/build/compose-previews/renders/resources/
      - name: Upload screenshot-test renders
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: samples-android-screenshot-test-renders
          path: samples/android-screenshot-test/build/compose-previews/renders/
      - name: Upload Wear sample renders
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: samples-wear-renders
          path: samples/wear/build/compose-previews/renders/
      - name: Upload Wear sample test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: samples-wear-test-results
          path: samples/wear/build/reports/tests/

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build CLI
        run: ./gradlew :cli:build

  # Pure-stdlib unittest for the script that drives `preview-baselines` and
  # `preview-comment` actions. Lives here because the script is JSON-shape-
  # coupled to the CLI — running it on every PR catches contract breaks
  # (e.g. PR #76 bare-list → envelope) before they hit a real PR.
  actions-tests:
    name: Actions Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run compare-previews tests
        run: python3 .github/actions/lib/test_compare_previews.py -v

  # VS Code extension tests — both the existing in-process Mocha suite and
  # the @vscode/test-electron integration tests. The latter download a
  # headless VS Code into ~/.vscode-test/, install the local fake
  # vscjava.vscode-gradle stub so our extensionDependency check passes, and
  # run the extension against a fixture workspace. xvfb is needed because
  # VS Code expects a display even in headless mode.
  vscode-extension-tests:
    name: VS Code Extension Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci
      - name: Compile
        working-directory: vscode-extension
        run: npm run compile
      - name: Run unit tests
        working-directory: vscode-extension
        run: npm test
      - name: Run integration tests (xvfb)
        working-directory: vscode-extension
        run: xvfb-run -a npm run test:electron
