name: 'Compose Preview Comment'
description: >
  Render previews on a PR, compare against the baselines on preview_main,
  and post a before/after comment. Changed PNGs are appended as a new
  commit on the shared preview_pr branch; the PR comment pins Before/After
  URLs to commit SHAs so the images keep resolving after merge.

inputs:
  cli-version:
    description: >
      compose-preview CLI version. Literal (e.g. "0.8.1"), "latest"
      (resolved via the GitHub releases API), or "catalog" (read from
      a Gradle version catalog — see catalog-path / catalog-key).
    default: 'latest'
  catalog-path:
    description: 'Path to the Gradle version catalog (when cli-version=catalog).'
    default: 'gradle/libs.versions.toml'
  catalog-key:
    description: '[versions] key to read (when cli-version=catalog).'
    default: 'composePreviewCli'
  timeout:
    description: 'CLI render timeout in seconds.'
    default: '600'
  base-branch:
    description: 'Branch name for composable @Preview baselines.'
    default: 'preview_main'
  resource-base-branch:
    description: >
      Branch name for Android XML resource baselines. Kept separate from
      `base-branch` because resource and composable previews are disjoint
      workflows (sibling sticky comments, sibling baseline branches). Set
      to '' to skip the resource compare entirely.
    default: 'preview_resources_main'
  head-branch:
    description: 'Shared branch that accumulates per-PR composable render commits.'
    default: 'preview_pr'
  resource-head-branch:
    description: >
      Shared branch that accumulates per-PR Android XML resource render
      commits. Sibling of `head-branch` for the resource pipeline — the After
      URLs in the resource sticky comment pin to commits on this branch, so
      it stays disjoint from `preview_pr` for the same reason
      `preview_resources_main` is disjoint from `preview_main`. Set to '' to
      skip the resource push entirely.
    default: 'preview_resources_pr'
  pr-number:
    description: 'Pull request number (auto-detected from context if omitted).'
    default: ''
  comment-on-empty-diff:
    description: >
      When `false` (default), skip posting a fresh PR comment if there are
      no preview changes in this run — avoids notifying reviewers about a
      "no visual changes" comment on every push. An existing diff comment
      is still patched in place to reflect the empty state (PATCHing
      doesn't trigger notifications). Set to `true` to always post / update
      the comment.
    default: 'false'

runs:
  using: 'composite'
  steps:
    # See preview-baselines/action.yml for the source-vs-release rationale
    # and for why these are full `org/repo/path@ref` references rather than
    # `./.github/actions/...` (relative `./` from inside a composite action
    # resolves against the consumer's $GITHUB_WORKSPACE, breaking external
    # use). The pinned tag is bumped per release by release-please.
    - name: Install CLI from source
      if: inputs.cli-version == 'source'
      uses: yschimke/compose-ai-tools/.github/actions/install-cli@v0.8.10 # x-release-please-version

    - name: Install CLI from release
      if: inputs.cli-version != 'source'
      uses: yschimke/compose-ai-tools/.github/actions/install@v0.8.10 # x-release-please-version
      with:
        version: ${{ inputs.cli-version }}
        catalog-path: ${{ inputs.catalog-path }}
        catalog-key: ${{ inputs.catalog-key }}

    - name: Render previews
      shell: bash
      env:
        RENDER_TIMEOUT: ${{ inputs.timeout }}
      run: compose-preview show --json --timeout "$RENDER_TIMEOUT" > _previews.json

    # Render Android XML resource previews (vector / animated-vector /
    # adaptive-icon) so the comment can include before/after for resource
    # changes. Mirrors the composable shape above: the CLI drives the
    # gradle render and emits a canonical JSON envelope. `show-resources`
    # exits 0 when the workspace has no `resources.json` (no-XML projects
    # are a legitimate state, not an error), so the subsequent
    # `compare-resources` and `copy-changed-resources` calls naturally
    # short-circuit on empty input.
    - name: Render Android resource previews
      id: render-resources
      shell: bash
      env:
        RENDER_TIMEOUT: ${{ inputs.timeout }}
      run: compose-preview show-resources --json --timeout "$RENDER_TIMEOUT" > _resources.json

    # Same artifact-on-failure shape as `renderPreviews-reports` for the
    # composable side — surfaces the actual stack trace from the
    # Robolectric run when it fails.
    - name: Upload renderAndroidResources reports
      if: failure() && steps.render-resources.outcome == 'failure'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: renderAndroidResources-reports
        path: |
          **/build/reports/tests/renderAndroidResources/
          **/build/test-results/renderAndroidResources/
          _resources.json
        if-no-files-found: ignore
        retention-days: 14

    - name: Fetch baselines
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base-branch }}
        RESOURCE_BASE_BRANCH: ${{ inputs.resource-base-branch }}
      run: |
        mkdir -p _baselines
        if git ls-remote --exit-code origin "$BASE_BRANCH" >/dev/null 2>&1; then
          git fetch origin "$BASE_BRANCH"
          git show "origin/${BASE_BRANCH}:baselines.json" \
            > _baselines/baselines.json 2>/dev/null || true
          # Extract the baseline renders/ tree alongside baselines.json so
          # the pixelmatch-based perceptual filter in compare-previews.py
          # has both PNGs to diff. `git archive` writes to stdout so the
          # working tree is left untouched; failures (e.g. preview_main
          # has no renders/ tree yet) fall back to the strict-bytes path.
          git archive "origin/${BASE_BRANCH}" renders 2>/dev/null \
            | tar -x -C _baselines/ 2>/dev/null || true
        else
          echo "No $BASE_BRANCH branch yet — treating all previews as new."
        fi
        # Resource baselines live on their own branch (default
        # `preview_resources_main`) — disjoint workflow from the composable
        # `preview_main`. First-ever resource render on a project hasn't
        # populated it yet; absent branch falls back to "treat every
        # resource as new". Resource renders extract to a sibling directory
        # so the two trees can't shadow each other (preview_main and
        # preview_resources_main both lay PNGs out as `renders/<module>/...`,
        # and even though resource paths carry a `resources/` segment after
        # the module, keeping the staging dirs separate avoids any chance
        # of cross-branch tar extraction stomping on a composable render).
        mkdir -p _resource_baselines
        if [ -n "$RESOURCE_BASE_BRANCH" ] && \
           git ls-remote --exit-code origin "$RESOURCE_BASE_BRANCH" >/dev/null 2>&1; then
          git fetch origin "$RESOURCE_BASE_BRANCH"
          git show "origin/${RESOURCE_BASE_BRANCH}:resource-baselines.json" \
            > _baselines/resource-baselines.json 2>/dev/null || true
          # Extract the baseline renders/ tree so the perceptual filter has
          # prior PNGs to diff. Adaptive-icon composite renders are sha-noisy
          # between Robolectric runs (the AA mask + PorterDuff.SRC_IN composite
          # produces sub-pixel jitter), so without this every adaptive icon
          # surfaces as a false diff — same failure mode as composable
          # issue #190 / PR #270 fixed for the @Preview side. Failures
          # (first run, no renders/ tree yet) fall back to the strict-bytes
          # path inside compare-previews.
          git archive "origin/${RESOURCE_BASE_BRANCH}" renders 2>/dev/null \
            | tar -x -C _resource_baselines/ 2>/dev/null || true
        fi

    - name: Install perceptual-diff dependencies
      shell: bash
      run: |
        # pixelmatch (Mapbox's algorithm, AA-aware) collapses sub-pixel
        # rounded-corner noise that the Compose stitched-LONG renderer can
        # emit between runs (issue #190). If install fails, the script
        # falls back to the strict sha-only comparison.
        python3 -m pip install --quiet 'pixelmatch==0.4.0' 'Pillow>=10' \
          || echo "pixelmatch install failed; falling back to strict-bytes diff" >&2

    - name: Resolve Before ref
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base-branch }}
        RESOURCE_BASE_BRANCH: ${{ inputs.resource-base-branch }}
        REPO: ${{ github.repository }}
        GITHUB_TOKEN_INLINE: ${{ github.token }}
      run: |
        set -euo pipefail
        # Pin Before URLs to the current preview_main tip SHA. Because the
        # preview-baselines action now appends to history rather than
        # force-pushing fresh orphans, this SHA stays reachable forever.
        BASE_SHA=$(git ls-remote \
          "https://x-access-token:${GITHUB_TOKEN_INLINE}@github.com/${REPO}.git" \
          "refs/heads/${BASE_BRANCH}" | awk '{print $1}')
        if [ -z "$BASE_SHA" ]; then
          # First-ever run (no preview_main yet). Fall back to the branch
          # name; Before images will 404 until the first baseline push lands,
          # after which new PR comments resolve to a SHA.
          BASE_SHA="$BASE_BRANCH"
        fi
        echo "$BASE_SHA" > _base_sha
        # Sibling Before SHA for the resources comment — pins to its own
        # branch (default `preview_resources_main`). When the input is
        # blank the resources comment is skipped further down anyway, so
        # we also blank `_resource_base_sha` to be defensive.
        if [ -n "$RESOURCE_BASE_BRANCH" ]; then
          RESOURCE_BASE_SHA=$(git ls-remote \
            "https://x-access-token:${GITHUB_TOKEN_INLINE}@github.com/${REPO}.git" \
            "refs/heads/${RESOURCE_BASE_BRANCH}" | awk '{print $1}')
          if [ -z "$RESOURCE_BASE_SHA" ]; then
            RESOURCE_BASE_SHA="$RESOURCE_BASE_BRANCH"
          fi
        else
          RESOURCE_BASE_SHA=""
        fi
        echo "$RESOURCE_BASE_SHA" > _resource_base_sha

    - name: Copy changed PNGs
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        python3 "$ACTION_PATH/../lib/compare-previews.py" copy-changed _previews.json \
          --baselines _baselines/baselines.json \
          --baseline-renders _baselines/renders \
          --output-dir _pr_renders
        # Resource captures stage into a sibling tree (`_pr_resource_renders/`)
        # so they push to a separate branch (`preview_resources_pr` by
        # default). Same disjoint-workflow rationale as the
        # `preview_main` / `preview_resources_main` baseline split: each
        # kind of preview gets its own per-PR After-URL history, separate
        # bisect lineage, separate sticky comment. Silent no-op when the
        # `_resources.json` envelope has no Android modules.
        python3 "$ACTION_PATH/../lib/compare-previews.py" copy-changed-resources \
          _resources.json \
          --baselines _baselines/resource-baselines.json \
          --baseline-renders _resource_baselines/renders \
          --output-dir _pr_resource_renders

    - name: Push PR renders
      shell: bash
      env:
        # `inputs.pr-number` defaults to "" so the `||` resolves to the
        # number from the event payload. Routing both through env removes
        # the template from the `run:` body entirely. (zizmor: template-injection)
        PR_INPUT_NUMBER: ${{ inputs.pr-number }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_BRANCH: ${{ inputs.head-branch }}
        REPO: ${{ github.repository }}
        GITHUB_TOKEN_INLINE: ${{ github.token }}
      run: |
        set -euo pipefail
        PR_NUMBER="${PR_INPUT_NUMBER:-$EVENT_PR_NUMBER}"

        if [ ! -d _pr_renders/renders ] || \
           [ -z "$(ls -A _pr_renders/renders 2>/dev/null)" ]; then
          echo "No changed renders to push."
          # Empty head SHA signals the compare step to fall back to the
          # branch name — no new/changed sections will reference it anyway.
          : > _head_sha
          exit 0
        fi

        cd _pr_renders
        git init -q
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote add origin \
          "https://x-access-token:${GITHUB_TOKEN_INLINE}@github.com/${REPO}.git"

        # Hash our tree once — each retry reuses it (only the parent changes).
        git add -A
        TREE=$(git write-tree)

        MSG="Preview renders for PR #${PR_NUMBER} (${GITHUB_SHA::8})"

        # Retry loop handles the push race when two PRs finish concurrently.
        # Per-PR concurrency group in the workflow serialises a single PR's
        # pushes, but different PRs push to the same shared branch and
        # second-to-push hits "non-fast-forward". Re-fetch tip, re-parent,
        # re-push; a minute of jittered retries beats serialising all PRs.
        attempt=1
        while :; do
          PARENT=""
          if git fetch --depth=1 --quiet origin "$HEAD_BRANCH" 2>/dev/null; then
            PARENT=$(git rev-parse FETCH_HEAD)
          fi

          if [ -n "$PARENT" ]; then
            COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "$MSG")
          else
            # First push ever for this shared branch — orphan commit.
            COMMIT=$(git commit-tree "$TREE" -m "$MSG")
          fi

          if git push --quiet origin "${COMMIT}:refs/heads/${HEAD_BRANCH}" 2>&1; then
            echo "$COMMIT" > "$GITHUB_WORKSPACE/_head_sha"
            exit 0
          fi

          if [ "$attempt" -ge 5 ]; then
            echo "Push to ${HEAD_BRANCH} failed after ${attempt} attempts." >&2
            exit 1
          fi
          delay=$((attempt * 2 + RANDOM % 3))
          echo "Push to ${HEAD_BRANCH} lost the race; retry ${attempt}/5 in ${delay}s…" >&2
          attempt=$((attempt + 1))
          sleep "$delay"
        done

    - name: Push resource PR renders
      if: inputs.resource-head-branch != ''
      shell: bash
      env:
        PR_INPUT_NUMBER: ${{ inputs.pr-number }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        RESOURCE_HEAD_BRANCH: ${{ inputs.resource-head-branch }}
        REPO: ${{ github.repository }}
        GITHUB_TOKEN_INLINE: ${{ github.token }}
      # Sibling of `Push PR renders` for resource captures. Same retry-on-
      # race logic, same orphan-vs-parented commit shape — just a different
      # input directory and a different target branch. When no resource
      # captures changed (empty staging dir), short-circuits silently
      # without creating an empty branch — matches `Push to resource
      # baselines branch` in preview-baselines/action.yml.
      run: |
        set -euo pipefail
        PR_NUMBER="${PR_INPUT_NUMBER:-$EVENT_PR_NUMBER}"

        if [ ! -d _pr_resource_renders/renders ] || \
           [ -z "$(ls -A _pr_resource_renders/renders 2>/dev/null)" ]; then
          echo "No changed resource renders to push."
          : > _resource_head_sha
          exit 0
        fi

        cd _pr_resource_renders
        git init -q
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote add origin \
          "https://x-access-token:${GITHUB_TOKEN_INLINE}@github.com/${REPO}.git"

        git add -A
        TREE=$(git write-tree)
        MSG="Resource preview renders for PR #${PR_NUMBER} (${GITHUB_SHA::8})"

        attempt=1
        while :; do
          PARENT=""
          if git fetch --depth=1 --quiet origin "$RESOURCE_HEAD_BRANCH" 2>/dev/null; then
            PARENT=$(git rev-parse FETCH_HEAD)
          fi

          if [ -n "$PARENT" ]; then
            COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "$MSG")
          else
            COMMIT=$(git commit-tree "$TREE" -m "$MSG")
          fi

          if git push --quiet origin "${COMMIT}:refs/heads/${RESOURCE_HEAD_BRANCH}" 2>&1; then
            echo "$COMMIT" > "$GITHUB_WORKSPACE/_resource_head_sha"
            exit 0
          fi

          if [ "$attempt" -ge 5 ]; then
            echo "Push to ${RESOURCE_HEAD_BRANCH} failed after ${attempt} attempts." >&2
            exit 1
          fi
          delay=$((attempt * 2 + RANDOM % 3))
          echo "Push to ${RESOURCE_HEAD_BRANCH} lost the race; retry ${attempt}/5 in ${delay}s…" >&2
          attempt=$((attempt + 1))
          sleep "$delay"
        done

    - name: Generate comment
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        REPO: ${{ github.repository }}
        HEAD_BRANCH: ${{ inputs.head-branch }}
        RESOURCE_HEAD_BRANCH: ${{ inputs.resource-head-branch }}
      run: |
        set -euo pipefail
        BASE_REF=$(cat _base_sha)
        HEAD_REF=$(cat _head_sha 2>/dev/null || true)
        # If nothing was pushed (no changed renders), fall back to the
        # branch name for the After ref — unused in practice because the
        # comment body won't contain any changed/new image tags.
        if [ -z "$HEAD_REF" ]; then
          HEAD_REF="$HEAD_BRANCH"
        fi

        python3 "$ACTION_PATH/../lib/compare-previews.py" compare _previews.json \
          --baselines _baselines/baselines.json \
          --baseline-renders _baselines/renders \
          --repo "$REPO" \
          --base-ref "$BASE_REF" \
          --head-ref "$HEAD_REF" \
          > _comment_body.md
        # Resources land in their own sticky comment with a sibling marker
        # (`<!-- preview-diff-resources -->`) — composable @Preview changes
        # and Android XML resource changes are different concerns and should
        # be edited / scrolled past independently. Empty stdout when nothing
        # diffed; the post step below skips emitting an empty comment.
        # Before URL pins to the resource base branch (default
        # `preview_resources_main`), distinct from the composable BASE_REF
        # so the markdown image links resolve to the right tree.
        RESOURCE_BASE_REF=$(cat _resource_base_sha 2>/dev/null || true)
        if [ -z "$RESOURCE_BASE_REF" ]; then
          RESOURCE_BASE_REF="$BASE_REF"
        fi
        # After URL pins to the resource PR-renders branch (default
        # `preview_resources_pr`) — sibling of HEAD_REF for resources.
        # Falls back to the branch name when nothing was pushed (the
        # comment body won't contain any new/changed image tags in that
        # case so the unresolved ref doesn't matter).
        RESOURCE_HEAD_REF=$(cat _resource_head_sha 2>/dev/null || true)
        if [ -z "$RESOURCE_HEAD_REF" ]; then
          RESOURCE_HEAD_REF="${RESOURCE_HEAD_BRANCH:-$HEAD_REF}"
        fi
        python3 "$ACTION_PATH/../lib/compare-previews.py" compare-resources \
          _resources.json \
          --baselines _baselines/resource-baselines.json \
          --baseline-renders _resource_baselines/renders \
          --repo "$REPO" \
          --base-ref "$RESOURCE_BASE_REF" \
          --head-ref "$RESOURCE_HEAD_REF" \
          > _comment_body_resources.md

    - name: Post or update PR comment
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_INPUT_NUMBER: ${{ inputs.pr-number }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        COMMENT_ON_EMPTY_DIFF: ${{ inputs.comment-on-empty-diff }}
      run: |
        set -euo pipefail
        PR_NUMBER="${PR_INPUT_NUMBER:-$EVENT_PR_NUMBER}"
        BODY=$(cat _comment_body.md)
        MARKER="<!-- preview-diff -->"

        COMMENT_ID=$(gh api \
          "repos/${REPO}/issues/${PR_NUMBER}/comments" \
          --paginate \
          --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
          | head -1)

        # Sentinel emitted by compare-previews.py's `compare` subcommand
        # when new/changed/removed are all empty (see cmd_compare). PATCHing
        # an existing comment is still useful — reviewers see the previously
        # flagged variants are now stable — and PATCH doesn't notify, so
        # skipping only applies to fresh comments.
        if grep -qF "No visual changes detected." _comment_body.md \
           && [ "$COMMENT_ON_EMPTY_DIFF" != "true" ] \
           && [ -z "$COMMENT_ID" ]; then
          echo "No preview diff and no existing comment — skipping (comment-on-empty-diff=false)."
          exit 0
        fi

        if [ -n "$COMMENT_ID" ]; then
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH -f body="$BODY"
        else
          gh pr comment "$PR_NUMBER" --body "$BODY"
        fi

    - name: Post or update resource preview comment
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_INPUT_NUMBER: ${{ inputs.pr-number }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        COMMENT_ON_EMPTY_DIFF: ${{ inputs.comment-on-empty-diff }}
      run: |
        set -euo pipefail
        PR_NUMBER="${PR_INPUT_NUMBER:-$EVENT_PR_NUMBER}"
        MARKER="<!-- preview-diff-resources -->"

        COMMENT_ID=$(gh api \
          "repos/${REPO}/issues/${PR_NUMBER}/comments" \
          --paginate \
          --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
          | head -1)

        # Four states for resource comments:
        #
        # 1. New diff this run + no prior comment  → post a fresh comment.
        # 2. New diff this run + prior comment      → PATCH the existing one.
        # 3. No diff this run + prior comment      → PATCH to a "resolved"
        #    body so reviewers can see resources used to differ but no longer
        #    do. Deleting outright would lose the comment-thread link in PR
        #    review history.
        # 4. No diff this run + no prior comment   → only post a fresh
        #    "resolved" body when comment-on-empty-diff=true; otherwise
        #    stay silent to avoid notification noise.
        RESOLVED_BODY="${MARKER}"$'\n'"## Resource Changes"$'\n\n'"_No resource changes in this PR's latest render._"
        if [ -s _comment_body_resources.md ]; then
          BODY=$(cat _comment_body_resources.md)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
        elif [ -n "$COMMENT_ID" ]; then
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH -f body="$RESOLVED_BODY"
        elif [ "$COMMENT_ON_EMPTY_DIFF" = "true" ]; then
          gh pr comment "$PR_NUMBER" --body "$RESOLVED_BODY"
        fi
