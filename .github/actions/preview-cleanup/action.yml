name: 'Compose Preview Cleanup'
description: 'Delete the per-PR preview renders branch when a PR is closed.'

inputs:
  pr-number:
    description: 'Pull request number (auto-detected from context if omitted)'
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Delete preview branch
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_INPUT_NUMBER: ${{ inputs.pr-number }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        PR_NUMBER="${PR_INPUT_NUMBER:-$EVENT_PR_NUMBER}"
        BRANCH="preview_pr/${PR_NUMBER}"
        gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
          -X DELETE 2>/dev/null || true
