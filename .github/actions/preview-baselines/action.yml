name: 'Compose Preview Baselines'
description: >
  Render all @Preview functions via the compose-preview CLI and push
  PNGs + baselines.json as a new commit on the preview_main branch. The
  branch is browsable on GitHub (README with inline images) and serves as
  the "before" state for PR diff comments — old commit SHAs stay reachable
  so PR comments pinned to a past baseline keep resolving forever.

inputs:
  cli-version:
    description: >
      compose-preview CLI version. Literal (e.g. "0.8.1"), "latest"
      (resolved via the GitHub releases API), or "catalog" (read from
      a Gradle version catalog — see catalog-path / catalog-key).
    default: 'latest'
  catalog-path:
    description: 'Path to the Gradle version catalog (when cli-version=catalog).'
    default: 'gradle/libs.versions.toml'
  catalog-key:
    description: '[versions] key to read (when cli-version=catalog).'
    default: 'composePreviewCli'
  timeout:
    description: 'CLI render timeout in seconds.'
    default: '600'
  branch:
    description: 'Branch name for composable @Preview baselines.'
    default: 'preview_main'
  resource-branch:
    description: >
      Branch name for Android XML resource baselines (vector / animated-vector /
      adaptive-icon). Kept separate from `branch` because resource and composable
      previews are disjoint workflows — independent push cadence, independent
      bisect history, independent diff comments. Set to '' to skip the resource
      push entirely.
    default: 'preview_resources_main'

runs:
  using: 'composite'
  steps:
    # Source-build path is internal to this repo's CI: when a PR changes
    # the CLI/plugin schema, the released CLI is one tag behind HEAD and
    # would 'version-skew' against the new previews.json shape. External
    # consumers never need this; their CLI/plugin pair always matches a
    # released tag.
    #
    # Both nested `uses:` references resolve as full `org/repo/path@ref`
    # forms rather than `./.github/actions/...`. Inside a composite action,
    # relative `./` paths resolve against the *consumer's* $GITHUB_WORKSPACE
    # (not this action's own checkout), so external consumers of
    # preview-baselines@vX.Y.Z would otherwise hit "Can't find action.yml
    # under .github/actions/install". The pinned tag is bumped on every
    # release by release-please (see release-please-config.json).
    - name: Install CLI from source
      if: inputs.cli-version == 'source'
      uses: yschimke/compose-ai-tools/.github/actions/install-cli@v0.8.9 # x-release-please-version

    - name: Install CLI from release
      if: inputs.cli-version != 'source'
      uses: yschimke/compose-ai-tools/.github/actions/install@v0.8.9 # x-release-please-version
      with:
        version: ${{ inputs.cli-version }}
        catalog-path: ${{ inputs.catalog-path }}
        catalog-key: ${{ inputs.catalog-key }}

    - name: Render previews
      id: render
      shell: bash
      env:
        RENDER_TIMEOUT: ${{ inputs.timeout }}
      run: compose-preview show --json --timeout "$RENDER_TIMEOUT" > _previews.json

    # When `renderPreviews` fails the actual stack traces only live in
    # samples/*/build/reports/tests/renderPreviews/ and test-results/.
    # Upload them so the failure is debuggable from the run page.
    - name: Upload renderPreviews reports
      if: failure() && steps.render.outcome == 'failure'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: renderPreviews-reports
        path: |
          **/build/reports/tests/renderPreviews/
          **/build/test-results/renderPreviews/
          _previews.json
        if-no-files-found: ignore
        retention-days: 14

    - name: Generate baselines
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        REPO: ${{ github.repository }}
        BASELINE_BRANCH: ${{ inputs.branch }}
      run: |
        python3 "$ACTION_PATH/../lib/compare-previews.py" generate _previews.json \
          --output-dir _baselines \
          --repo "$REPO" \
          --branch "$BASELINE_BRANCH"

    - name: Push to baselines branch
      shell: bash
      # All templated values go through env first so a malicious input
      # (e.g. a branch name containing "$(rm -rf /)") can't expand inside
      # the shell script. (zizmor: template-injection)
      env:
        BASELINE_BRANCH: ${{ inputs.branch }}
        REPO: ${{ github.repository }}
        GITHUB_TOKEN_INLINE: ${{ github.token }}
      run: |
        set -euo pipefail
        cd _baselines

        git init -q
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote add origin \
          "https://x-access-token:${GITHUB_TOKEN_INLINE}@github.com/${REPO}.git"

        # Hash our generated tree. `git add -A` on a fresh index picks up
        # everything under the current directory.
        git add -A
        TREE=$(git write-tree)

        # Fetch the existing tip (if any) so the new commit lands on top of
        # history rather than force-pushing a fresh orphan commit each run.
        # Keeping history means a PR comment pinned to any past preview_main
        # SHA stays resolvable: the blob is reachable via the branch chain.
        PARENT=""
        if git fetch --depth=1 --quiet origin "$BASELINE_BRANCH" 2>/dev/null; then
          PARENT=$(git rev-parse FETCH_HEAD)
          PARENT_TREE=$(git rev-parse "${PARENT}^{tree}")
          if [ "$TREE" = "$PARENT_TREE" ]; then
            echo "Baselines unchanged vs ${BASELINE_BRANCH}; skipping push."
            exit 0
          fi
        fi

        MSG="Update preview baselines from ${GITHUB_SHA::8}"
        if [ -n "$PARENT" ]; then
          COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "$MSG")
        else
          COMMIT=$(git commit-tree "$TREE" -m "$MSG")
        fi

        # Fast-forward push (no --force). The baseline workflow serialises on
        # its concurrency group so no race is expected; a non-FF rejection
        # here means something external moved the ref and warrants an alert.
        git push --quiet origin "${COMMIT}:refs/heads/${BASELINE_BRANCH}"

    # ─── Android XML resource previews ────────────────────────────────────
    # Sibling pipeline pushing to its own branch (default `preview_resources_main`).
    # Workflows are disjoint from composable @Preview, so we keep the histories
    # separate — independent bisect, independent diff comments, independent
    # push cadence. See the `resource-branch` input docstring above.

    - name: Render resource previews
      if: inputs.resource-branch != ''
      id: render-resources
      shell: bash
      env:
        RENDER_TIMEOUT: ${{ inputs.timeout }}
      # `compose-preview show-resources` self-no-ops on workspaces without
      # any `resources.json` (exit 0 with "No Android resource previews
      # found.") — the subsequent generate / push steps then short-circuit.
      run: compose-preview show-resources --json --timeout "$RENDER_TIMEOUT" > _resources.json

    - name: Upload renderAndroidResources reports
      if: failure() && steps.render-resources.outcome == 'failure'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: renderAndroidResources-reports
        path: |
          **/build/reports/tests/renderAndroidResources/
          **/build/test-results/renderAndroidResources/
          _resources.json
        if-no-files-found: ignore
        retention-days: 14

    - name: Generate resource baselines
      if: inputs.resource-branch != ''
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      # `generate-resources` globs `<module>/build/compose-previews/resources.json`
      # — the show-resources call above guarantees those exist + their PNGs
      # are fresh on disk. Output dir is the staging tree the next step pushes.
      run: |
        python3 "$ACTION_PATH/../lib/compare-previews.py" generate-resources \
          --output-dir _resource_baselines \
          --workspace-root .

    - name: Push to resource baselines branch
      if: inputs.resource-branch != ''
      shell: bash
      env:
        RESOURCE_BRANCH: ${{ inputs.resource-branch }}
        REPO: ${{ github.repository }}
        GITHUB_TOKEN_INLINE: ${{ github.token }}
      run: |
        set -euo pipefail
        # Workspace had no resource manifests / no rendered PNGs — generate
        # didn't create the staging dir. Skip the push silently rather than
        # creating an empty branch.
        if [ ! -d _resource_baselines ] || [ ! -f _resource_baselines/resource-baselines.json ]; then
          echo "No resource baselines staged; skipping push to ${RESOURCE_BRANCH}."
          exit 0
        fi

        cd _resource_baselines
        git init -q
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote add origin \
          "https://x-access-token:${GITHUB_TOKEN_INLINE}@github.com/${REPO}.git"

        git add -A
        TREE=$(git write-tree)

        PARENT=""
        if git fetch --depth=1 --quiet origin "$RESOURCE_BRANCH" 2>/dev/null; then
          PARENT=$(git rev-parse FETCH_HEAD)
          PARENT_TREE=$(git rev-parse "${PARENT}^{tree}")
          if [ "$TREE" = "$PARENT_TREE" ]; then
            echo "Resource baselines unchanged vs ${RESOURCE_BRANCH}; skipping push."
            exit 0
          fi
        fi

        MSG="Update resource baselines from ${GITHUB_SHA::8}"
        if [ -n "$PARENT" ]; then
          COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "$MSG")
        else
          COMMIT=$(git commit-tree "$TREE" -m "$MSG")
        fi
        git push --quiet origin "${COMMIT}:refs/heads/${RESOURCE_BRANCH}"
