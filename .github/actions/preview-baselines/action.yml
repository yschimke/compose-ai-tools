name: 'Compose Preview Baselines'
description: >
  Render all @Preview functions via the compose-preview CLI and push
  PNGs + baselines.json to a preview_main orphan branch. The branch is
  browsable on GitHub (README with inline images) and serves as the
  "before" state for PR diff comments.

inputs:
  timeout:
    description: 'CLI render timeout in seconds'
    default: '600'
  branch:
    description: 'Branch name for baselines'
    default: 'preview_main'

runs:
  using: 'composite'
  steps:
    - name: Install CLI
      shell: bash
      run: |
        set -euo pipefail
        VERSION=$(gh release view --repo yschimke/compose-ai-tools --json tagName -q .tagName | sed 's/^v//')
        echo "Downloading compose-preview ${VERSION}..."
        gh release download "v${VERSION}" --repo yschimke/compose-ai-tools \
          --pattern "compose-preview-${VERSION}.tar.gz" --dir /tmp
        mkdir -p /opt/compose-preview
        tar -xzf "/tmp/compose-preview-${VERSION}.tar.gz" -C /opt/compose-preview --strip-components=1
        echo "/opt/compose-preview/bin" >> "$GITHUB_PATH"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Render previews
      shell: bash
      env:
        RENDER_TIMEOUT: ${{ inputs.timeout }}
      run: compose-preview show --json --timeout "$RENDER_TIMEOUT" > _previews.json

    - name: Generate baselines
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        REPO: ${{ github.repository }}
        BASELINE_BRANCH: ${{ inputs.branch }}
      run: |
        python3 "$ACTION_PATH/../lib/compare-previews.py" generate _previews.json \
          --output-dir _baselines \
          --repo "$REPO" \
          --branch "$BASELINE_BRANCH"

    - name: Push to baselines branch
      shell: bash
      # All templated values go through env first so a malicious input
      # (e.g. a branch name containing "$(rm -rf /)") can't expand inside
      # the shell script. (zizmor: template-injection)
      env:
        BASELINE_BRANCH: ${{ inputs.branch }}
        REPO: ${{ github.repository }}
        GITHUB_TOKEN_INLINE: ${{ github.token }}
      run: |
        set -euo pipefail
        cd _baselines

        git init
        git checkout -b "$BASELINE_BRANCH"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Update preview baselines from ${GITHUB_SHA::8}"

        git remote add origin \
          "https://x-access-token:${GITHUB_TOKEN_INLINE}@github.com/${REPO}.git"
        git push --force origin "$BASELINE_BRANCH"
